<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>zach brill com</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Georgia', serif;
            color: #333;
            background: #fff;
            touch-action: manipulation;
        }

        header {
            padding: 2rem;
        }

        h1 {
            font-size: 1.2rem;
            font-weight: 400;
            letter-spacing: 1px;
            margin-bottom: 1rem;
        }

        nav a {
            margin-right: 1.5rem;
            color: #999;
            text-decoration: none;
            font-size: 0.85rem;
            cursor: pointer;
        }

        nav a.active {
            color: #000;
        }

        @media (max-width: 768px) {
            header {
                padding: 1.5rem;
            }

            h1 {
                font-size: 1rem;
            }

            nav a {
                font-size: 0.8rem;
                margin-right: 1rem;
            }
        }

        .project-view {
            display: none;
            padding: 2rem;
        }

        .project-view.active {
            display: block;
        }

        @media (max-width: 768px) {
            .project-view {
                padding: 1rem;
            }
        }

        .image-viewer {
            position: relative;
        }

        .image-container {
            width: 50%;
            height: 80vh;
            display: flex;
            align-items: center;
            padding-bottom: 4rem;
        }

        .image-container img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .image-placeholder {
            color: #ccc;
            font-size: 0.85rem;
            padding-left: 2rem;
        }

        @media (max-width: 768px) {
            .image-container {
                width: 100%;
                height: 70vh;
                justify-content: center;
            }
        }

        .arrow {
            position: fixed;
            bottom: 5%;
            /* transform: translateY(-50%); */
            background: none;
            border: none;
            font-size: 1rem;
            color: black;
            cursor: pointer;
            padding: 1rem;
            transition: color 0.3s;
            -webkit-tap-highlight-color: transparent;
        }

        .arrow:hover:not(:disabled) {
            color: #000;
        }

        .arrow:active:not(:disabled) {
            color: #000;
        }

        .arrow:disabled {
            opacity: 0.2;
            cursor: not-allowed;
        }

        .arrow.prev {
            left: 1rem;
        }

        .arrow.next {
            right: 1rem;
        }

        .counter {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .counter {
                bottom: 1rem;
                right: 1rem;
                font-size: 0.7rem;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>you are here</h1>
        <nav>
            <a class="project-link active" data-project="project1">untitled (sauvie)</a>
            <a class="project-link" data-project="project2">untitled (desert)</a>
            <a class="project-link" data-project="project3">music</a>
        </nav>
    </header>

    <div class="project-view active" id="project1">
        <div class="image-viewer">
            <div class="image-container">
                <div class="image-placeholder">Image 1 of 13</div>
            </div>
        </div>
    </div>

    <div class="project-view" id="project2">
        <div class="image-viewer">
            <div class="image-container">
                <div class="image-placeholder">Image 1 of 4</div>
            </div>
        </div>
    </div>

    <div class="project-view" id="project3">
        <iframe style="border: 0; width: 350px; height: 786px;" src="https://bandcamp.com/EmbeddedPlayer/album=707130495/size=large/bgcol=333333/linkcol=ffffff/transparent=false/" seamless><a href="https://chits.bandcamp.com/album/kind-man">Kind Man by chits</a></iframe>
    </div>

    <button class="arrow prev">←</button>
    <button class="arrow next">→</button>
    <div class="counter"></div>

    <script>
        const projects = {
            project1: {
                images: ['./img/sauvie/IMG_3886.jpg', './img/sauvie/IMG_3640.jpg', './img/sauvie/IMG_3897.jpg',  './img/sauvie/IMG_3860.jpg', './img/sauvie/IMG_3876.jpg',
                    './img/sauvie/IMG_3846.jpg', './img/sauvie/IMG_3746.jpg', './img/sauvie/IMG_3881.jpg', './img/sauvie/IMG_3211.jpg', './img/sauvie/IMG_3906.jpg',
                    './img/sauvie/IMG_3875.jpg', './img/sauvie/IMG_3892.jpg', './img/sauvie/IMG_3883.jpg', './img/sauvie/IMG_3334-2.jpg'
                ],
                current: 0
            },
            project2: {
                images: ['./img/desert/IMG_3920.jpg', './img/desert/IMG_3927.jpg', './img/desert/IMG_3918.jpg', './img/desert/IMG_2538.jpg', './img/desert/IMG_2566.jpg', './img/desert/IMG_3943.jpg', './img/desert/IMG_3964.jpg'],
                current: 0
            },
            project3: {
                music: true,
                images: [],
                current: 0
            }
        };

        let activeProject = 'project1';

        const prevArrow = document.querySelector('.arrow.prev');
        const nextArrow = document.querySelector('.arrow.next');
        const counter = document.querySelector('.counter');

        function renderBandcamp() {
            container.innerHTML = `<iframe style="border: 0; width: 350px; height: 470px;" src="https://bandcamp.com/EmbeddedPlayer/album=707130495/size=large/bgcol=ffffff/linkcol=0687f5/tracklist=false/transparent=true/" seamless><a href="https://chits.bandcamp.com/album/kind-man">Kind Man by chits</a></iframe>`
        }

        function updateImage() {
            const project = projects[activeProject];
            const container = document.querySelector(`#${activeProject} .image-container`);

            container.innerHTML = `<img src="${project.images[project.current]}" alt="Image ${project.current + 1}">`;
            counter.textContent = `${project.current + 1} / ${project.images.length}`;

            prevArrow.disabled = project.current === 0;
            nextArrow.disabled = project.current === project.images.length - 1;
        }

        function navigate(direction) {
            const project = projects[activeProject];
            if (direction === 'next' && project.current < project.images.length - 1) {
                project.current++;
            } else if (direction === 'prev' && project.current > 0) {
                project.current--;
            }
            updateImage();
        }

        document.querySelectorAll('.project-link').forEach(link => {
            link.addEventListener('click', (e) => {
                e.preventDefault();
                const projectId = link.dataset.project;

                document.querySelectorAll('.project-view').forEach(p => p.classList.remove('active'));
                document.querySelectorAll('.project-link').forEach(l => l.classList.remove('active'));

                document.getElementById(projectId).classList.add('active');
                link.classList.add('active');

                activeProject = projectId;
                if (activeProject.music) {
                    embedBandcamp();
                }
                else {
                    updateImage();
                }
            });
        });

        prevArrow.addEventListener('click', () => navigate('prev'));
        nextArrow.addEventListener('click', () => navigate('next'));

        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight') navigate('next');
            else if (e.key === 'ArrowLeft') navigate('prev');
        });

        // // Swipe gestures for mobile
        // let touchStartX = 0;
        // let touchEndX = 0;

        // document.addEventListener('touchstart', (e) => {
        //     touchStartX = e.changedTouches[0].screenX;
        // });

        // document.addEventListener('touchend', (e) => {
        //     touchEndX = e.changedTouches[0].screenX;
        //     handleSwipe();
        // });

        // function handleSwipe() {
        //     const swipeThreshold = 50;
        //     const diff = touchStartX - touchEndX;

        //     if (Math.abs(diff) > swipeThreshold) {
        //         if (diff > 0) {
        //             navigate('next');
        //         } else {
        //             navigate('prev');
        //         }
        //     }
        // }

        updateImage();
    </script>
</body>
</html>
